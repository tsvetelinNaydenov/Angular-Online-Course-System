<!-- Search component-->
 <app-search
    placeholder="Search courses..."
    (search)="searchCoursesHandler($event)"></app-search>

<!-- Course List component-->
<app-courses-list 
    [courses]="sampleCourse" 
    [editable]="true"
    (showCourse)="showCourseHandler($event)"
    (editCourse)="editCourseHandler($event)"
    (deleteCourse)="deleteCourseHandler($event)">
</app-courses-list>
