<h2 class="text-align-center">Login</h2>
<div class="app-plate">
  <form #loginForm="ngForm" (ngSubmit)="onSubmit()">
    <div class="login-form">
      <div>
        <div class="form__control">
          <label for="email">Email</label>
          <!--Use the name `email` for the form control.-->
          <input 
            type="email" 
            id="email" 
            placeholder="Input text" 
            name="email" 
            [(ngModel)]="email" 
            required
            emailValidator
            #emailModel="ngModel"/>
        <div *ngIf="emailModel.invalid && (emailModel.touched || loginForm.submitted)">
          <span id="emailErrorMessage" class="text-danger" *ngIf="emailModel.errors?.['required']">Email is required.</span>
          <span id="invalidEmailErrorMessage" class="text-danger" *ngIf="emailModel.errors?.['emailInvalid']">Invalid email format</span>
        </div>

        </div>
        <div class="form__control">
          <label for="password">Password</label>
          <!--Use the name `password` for the form control.-->
          <input 
            type="password" 
            id="password" 
            placeholder="Input text" 
            name="password" 
            [(ngModel)]="password" 
            required 
            #passwordModel="ngModel"/>
          <span 
            id="passwordErrorMessage" 
            class="text-danger" 
            *ngIf="passwordModel.errors?.['required'] && (passwordModel.touched || loginForm.submitted)">Password is required.</span>
        </div>
      </div>
      <div>
        <div class="form__action">
          <span *ngIf="errorMessage"class="text-danger">{{ errorMessage }}</span>
          <app-button buttonText="Login" type="submit"></app-button>
        </div>
        <div class="form__text">
          If you don't have an account you may <a routerLink="/registration"><strong>Registration</strong></a>
        </div>
      </div>
    </div>
  </form>
</div>
